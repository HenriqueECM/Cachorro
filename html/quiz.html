<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz sobre Cachorros</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="header">
        <div class="container header__container">
            <h1 class="logo">Cachorros</h1>

            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="/html/home.html" class="nav__link">Home</a></li>
                    <li><a href="/html/raca.html" class="nav__link">Raças</a></li>
                    <li><a href="/html/quiz.html" class="nav__link nav__link--active">Quiz</a></li>
            </nav>

            
        </div>
    </header>

    <main>
        <section class="quiz-container">
            <h1>O Cão Ideal para Você</h1>
            <p style="text-align: center; color: var(--color-text-light); margin-bottom: var(--spacing-2xl);">
                Responda este quiz para descobrir qual raça de cão combina mais com seu estilo de vida!
            </p>

            <form action="resultado.html" method="GET">
                <div class="question">
                    <label for="q1"><strong>1. Qual é a raça de cão mais popular no Brasil?</strong></label>
                    <div class="options">
                        <input type="radio" id="q1a" name="q1" value="a">
                        <label for="q1a">a) Pastor Alemão</label>
                        <input type="radio" id="q1b" name="q1" value="b">
                        <label for="q1b">b) Rottweiler</label>
                        <input type="radio" id="q1c" name="q1" value="c">
                        <label for="q1c">c) Vira-Lata</label>
                        <input type="radio" id="q1d" name="q1" value="d">
                        <label for="q1d">d) Shih Tzu</label>
                    </div>
                </div>

                <div class="question">
                    <label for="q2"><strong>2. Qual é a expectativa de vida média de um cão?</strong></label>
                    <div class="options">
                        <input type="radio" id="q2a" name="q2" value="a">
                        <label for="q2a">a) 5-7 anos</label>
                        <input type="radio" id="q2b" name="q2" value="b">
                        <label for="q2b">b) 8-12 anos</label>
                        <input type="radio" id="q2c" name="q2" value="c">
                        <label for="q2c">c) 13-15 anos</label>
                        <input type="radio" id="q2d" name="q2" value="d">
                        <label for="q2d">d) 16-20 anos</label>
                    </div>
                </div>

                <div class="question">
                    <label for="q3"><strong>3. Qual é a raça de cão mais rápida do mundo?</strong></label>
                    <div class="options">
                        <input type="radio" id="q3a" name="q3" value="a">
                        <label for="q3a">a) Greyhound</label>
                        <input type="radio" id="q3b" name="q3" value="b">
                        <label for="q3b">b) Saluki</label>
                        <input type="radio" id="q3c" name="q3" value="c">
                        <label for="q3c">c) Whippet</label>
                        <input type="radio" id="q3d" name="q3" value="d">
                        <label for="q3d">d) Borzoi</label>
                    </div>
                </div>

                <div class="question">
                    <label for="q4"><strong>4. Qual é a raça de cão mais inteligente?</strong></label>
                    <div class="options">
                        <input type="radio" id="q4a" name="q4" value="a">
                        <label for="q4a">a) Border Collie</label>
                        <input type="radio" id="q4b" name="q4" value="b">
                        <label for="q4b">b) Poodle</label>
                        <input type="radio" id="q4c" name="q4" value="c">
                        <label for="q4c">c) Pastor Alemão</label>
                        <input type="radio" id="q4d" name="q4" value="d">
                        <label for="q4d">d) Golden Retriever</label>
                    </div>
                </div>

                <div class="question">
                    <label for="q5"><strong>5. Qual é a raça de cão mais antiga do mundo?</strong></label>
                    <div class="options">
                        <input type="radio" id="q5a" name="q5" value="a">
                        <label for="q5a">a) Basenji</label>
                        <input type="radio" id="q5b" name="q5" value="b">
                        <label for="q5b">b) Saluki</label>
                        <input type="radio" id="q5c" name="q5" value="c">
                        <label for="q5c">c) Afghan Hound</label>
                        <input type="radio" id="q5d" name="q5" value="d">
                        <label for="q5d">d) Chow Chow</label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Enviar Respostas</button>
            </form>
        </section>
    </main>

</body>

</html>
